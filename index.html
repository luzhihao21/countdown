<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>倒计时</title>

<style>
body {
  margin:0;
  font-family:"Noto Sans SC",sans-serif;
  background: linear-gradient(135deg,#e8f5e9,#c8e6c9);
  color:#1b5e20;
}

.container {
  padding:20px;
}

/* 分类 */
.section h2 {
  cursor:pointer;
  font-size:22px;
  margin-top:20px;
}

/* 卡片 */
.card {
  background: rgba(255,255,255,0.7);
  backdrop-filter: blur(20px);
  border-radius:20px;
  padding:20px;
  margin:12px 0;
  box-shadow: 0 4px 20px rgba(0,0,0,0.08);
}

/* 标题 */
.title {
  font-size:20px;
  margin-bottom:10px;
}

/* ⏱ 时间（放大！） */
.time {
  font-size:26px;
  font-weight:bold;
}

/* 按钮 */
.add-btn {
  position: fixed;
  bottom: 25px;
  right: 25px;
  width:60px;
  height:60px;
  border-radius:50%;
  background: rgba(255,255,255,0.8);
  backdrop-filter: blur(15px);
  font-size:30px;
  text-align:center;
  line-height:60px;
  box-shadow: 0 4px 15px rgba(0,0,0,0.15);
}
</style>
</head>

<body>

<div class="container" id="app"></div>
<div class="add-btn" onclick="addItem()">＋</div>

<script>
let data = JSON.parse(localStorage.getItem("countdowns")) || [
  {title:"日语考试",date:"2026-07-05 12:00",category:"学习"}
];

function save(){
  localStorage.setItem("countdowns",JSON.stringify(data));
}

function toggleSection(el){
  let next = el.nextElementSibling;
  next.style.display = next.style.display==="none"?"block":"none";
}

/* ✅ 自动解析时间 */
function parseDate(str){
  return new Date(str.replace(/-/g,"/"));
}

function format(diff){
  const d=Math.floor(diff/(1000*60*60*24));
  const h=Math.floor((diff/(1000*60*60))%24);
  const m=Math.floor((diff/(1000*60))%60);
  const s=Math.floor((diff/1000)%60);
  return d+"天 "+h+"时 "+m+"分 "+s+"秒";
}

function render(){
  const app=document.getElementById("app");
  app.innerHTML="";

  const groups={};

  data.forEach(item=>{
    if(!groups[item.category]) groups[item.category]=[];
    groups[item.category].push(item);
  });

  for(let cat in groups){
    const section=document.createElement("div");

    const title=document.createElement("h2");
    title.innerText="📂 "+cat;
    title.onclick=function(){toggleSection(this)};
    section.appendChild(title);

    const list=document.createElement("div");

    groups[cat].forEach(item=>{
      const card=document.createElement("div");
      card.className="card";

      const now=new Date();
      const target=parseDate(item.date);
      const diff=target-now;

      let text = diff<=0 ? "已到时间！" : format(diff);

      card.innerHTML=
        "<div class='title'>"+item.title+"</div>"+
        "<div class='time'>"+text+"</div>";

      list.appendChild(card);
    });

    section.appendChild(list);
    app.appendChild(section);
  }
}

/* ➕新增 */
function addItem(){
  const title=prompt("名字？");
  const date=prompt("日期（例：2026-07-05 12:00）");
  const category=prompt("分类（学习/生活）");

  if(title && date && category){
    data.push({title,date,category});
    save();
    render();
  }
}

setInterval(render,1000);
render();
</script>

</body>
</html>
