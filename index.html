<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>倒计时</title>

<style>
body {
  margin:0;
  font-family:"Noto Sans SC",sans-serif;
  color:white;
  background: linear-gradient(135deg,#2e7d32,#66bb6a);
}

/* iOS卡片风 */
.container {
  padding:20px;
}

.section {
  margin-bottom:20px;
}

.section h2 {
  cursor:pointer;
}

.card {
  background: rgba(255,255,255,0.15);
  backdrop-filter: blur(10px);
  margin:10px 0;
  padding:15px;
  border-radius:15px;
}

.add-btn {
  position: fixed;
  bottom: 30px;
  right: 30px;
  background:#4caf50;
  width:60px;
  height:60px;
  border-radius:50%;
  font-size:30px;
  text-align:center;
  line-height:60px;
}
</style>
</head>

<body>

<div class="container" id="app"></div>

<div class="add-btn" onclick="addItem()">＋</div>

<script>
let data = JSON.parse(localStorage.getItem("countdowns")) || [
  {title:"日语考试",date:"2026-07-01",category:"学习"},
  {title:"开始健身",date:"2026-05-01",category:"生活"}
];

function save(){
  localStorage.setItem("countdowns",JSON.stringify(data));
}

function toggleSection(el){
  let next = el.nextElementSibling;
  next.style.display = next.style.display==="none"?"block":"none";
}

function render(){
  const app=document.getElementById("app");
  app.innerHTML="";

  const groups={};

  data.forEach(item=>{
    if(!groups[item.category]) groups[item.category]=[];
    groups[item.category].push(item);
  });

  for(let cat in groups){
    const section=document.createElement("div");
    section.className="section";

    const title=document.createElement("h2");
    title.innerText="📂 "+cat;
    title.onclick=function(){toggleSection(this)};
    section.appendChild(title);

    const list=document.createElement("div");

    groups[cat].forEach(item=>{
      const card=document.createElement("div");
      card.className="card";

      const now=new Date();
      const target=new Date(item.date);
      const diff=target-now;

      let text="";
      if(diff<=0){
        text="已到时间！";
      }else{
        const d=Math.floor(diff/(1000*60*60*24));
        text=d+" 天";
      }

      card.innerHTML="<b>"+item.title+"</b><br>"+text;
      list.appendChild(card);
    });

    section.appendChild(list);
    app.appendChild(section);
  }
}

function addItem(){
  const title=prompt("名字？");
  const date=prompt("日期 (YYYY-MM-DD)");
  const category=prompt("分类（比如 学习/生活）");

  if(title && date && category){
    data.push({title,date,category});
    save();
    render();
  }
}

setInterval(render,1000);
render();
</script>

</body>
</html>
