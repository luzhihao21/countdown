<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>倒计时</title>

<style>
body {
  margin:0;
  font-family:"Noto Sans SC",sans-serif;

  /* 🌿 更淡的背景 */
  background: linear-gradient(135deg,#e8f5e9,#c8e6c9);
  color:#1b5e20;
}

/* 容器 */
.container {
  padding:20px;
}

/* 分类标题 */
.section h2 {
  cursor:pointer;
  font-size:18px;
  margin-top:20px;
}

/* 🍏 iOS风卡片 */
.card {
  background: rgba(255,255,255,0.6);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);

  border-radius:20px;
  padding:15px;
  margin:10px 0;

  box-shadow: 0 4px 20px rgba(0,0,0,0.08);
}

/* 标题 */
.title {
  font-size:16px;
  margin-bottom:8px;
}

/* 时间 */
.time {
  font-size:18px;
  font-weight:bold;
}

/* ➕按钮（更像iOS） */
.add-btn {
  position: fixed;
  bottom: 25px;
  right: 25px;

  width:55px;
  height:55px;
  border-radius:50%;

  background: rgba(255,255,255,0.7);
  backdrop-filter: blur(15px);

  font-size:28px;
  text-align:center;
  line-height:55px;

  box-shadow: 0 4px 15px rgba(0,0,0,0.15);
}
</style>
</head>

<body>

<div class="container" id="app"></div>

<div class="add-btn" onclick="addItem()">＋</div>

<script>
let data = JSON.parse(localStorage.getItem("countdowns")) || [
  {title:"日语考试",date:"2026-07-01 00:00:00",category:"学习"},
  {title:"开始健身",date:"2026-05-01 00:00:00",category:"生活"}
];

function save(){
  localStorage.setItem("countdowns",JSON.stringify(data));
}

function toggleSection(el){
  let next = el.nextElementSibling;
  next.style.display = next.style.display==="none"?"block":"none";
}

function format(diff){
  const d=Math.floor(diff/(1000*60*60*24));
  const h=Math.floor((diff/(1000*60*60))%24);
  const m=Math.floor((diff/(1000*60))%60);
  const s=Math.floor((diff/1000)%60);
  return d+"天 "+h+"时 "+m+"分 "+s+"秒";
}

function render(){
  const app=document.getElementById("app");
  app.innerHTML="";

  const groups={};

  data.forEach(item=>{
    if(!groups[item.category]) groups[item.category]=[];
    groups[item.category].push(item);
  });

  for(let cat in groups){
    const section=document.createElement("div");
    section.className="section";

    const title=document.createElement("h2");
    title.innerText="📂 "+cat;
    title.onclick=function(){toggleSection(this)};
    section.appendChild(title);

    const list=document.createElement("div");

    groups[cat].forEach(item=>{
      const card=document.createElement("div");
      card.className="card";

      const now=new Date();
      const target=new Date(item.date);
      const diff=target-now;

      let text = diff<=0 ? "已到时间！" : format(diff);

      card.innerHTML=
        "<div class='title'>"+item.title+"</div>"+
        "<div class='time'>"+text+"</div>";

      list.appendChild(card);
    });

    section.appendChild(list);
    app.appendChild(section);
  }
}

function addItem(){
  const title=prompt("名字？");
  const date=prompt("日期 (YYYY-MM-DD HH:MM:SS)");
  const category=prompt("分类（比如 学习/生活）");

  if(title && date && category){
    data.push({title,date,category});
    save();
    render();
  }
}

setInterval(render,1000);
render();
</script>

</body>
</html>
