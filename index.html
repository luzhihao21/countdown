<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>倒计时</title>

<style>
body {
  margin:0;
  font-family:"Noto Sans SC",sans-serif;
  background: linear-gradient(135deg,#e8f5e9,#c8e6c9);
  color:#1b5e20;
}

.container { padding:20px; }

.card {
  background: rgba(255,255,255,0.7);
  backdrop-filter: blur(20px);
  border-radius:20px;
  padding:18px;
  margin:12px 0;
  box-shadow: 0 4px 20px rgba(0,0,0,0.08);
  position: relative;
}

.title { font-size:20px; margin-bottom:10px; }

/* 🔥 数字翻页感（关键） */
.time {
  font-size:30px;
  font-weight:bold;
  display:inline-block;
  transition: transform 0.2s ease, opacity 0.2s ease;
}

.flip {
  transform: translateY(-6px) scale(1.05);
  opacity:0.6;
}

.btns {
  position:absolute;
  right:10px;
  top:10px;
}

.btn {
  font-size:14px;
  margin-left:6px;
  cursor:pointer;
}

.add-btn {
  position: fixed;
  bottom: 25px;
  right: 25px;
  width:60px;
  height:60px;
  border-radius:50%;
  background: rgba(255,255,255,0.85);
  backdrop-filter: blur(15px);
  font-size:30px;
  text-align:center;
  line-height:60px;
}
</style>
</head>

<body>

<div class="container" id="app"></div>
<div class="add-btn" onclick="addItem()">＋</div>

<script>
let data = JSON.parse(localStorage.getItem("countdowns")) || [
  {title:"日语考试",date:"2026-07-05 12:00",category:"学习"}
];

function save(){
  localStorage.setItem("countdowns",JSON.stringify(data));
}

/* 时间解析 */
function parseDate(str){
  return new Date(str.replace(/-/g,"/"));
}

function format(diff){
  const d=Math.floor(diff/(1000*60*60*24));
  const h=Math.floor((diff/(1000*60*60))%24);
  const m=Math.floor((diff/(1000*60))%60);
  const s=Math.floor((diff/1000)%60);
  return {d,h,m,s};
}

/* ✨ 翻页动画 */
function animate(el){
  el.classList.add("flip");
  setTimeout(()=>el.classList.remove("flip"),200);
}

function render(){
  const app=document.getElementById("app");
  app.innerHTML="";

  data.forEach((item,index)=>{
    const card=document.createElement("div");
    card.className="card";

    const now=new Date();
    const target=parseDate(item.date);
    const diff=target-now;

    let f = diff<=0 ? {d:0,h:0,m:0,s:0} : format(diff);

    card.innerHTML=`
      <div class="title">${item.title}</div>

      <div class="time" id="t${index}">
        ${f.d}天 ${f.h}时 ${f.m}分 ${f.s}秒
      </div>

      <div class="btns">
        <span class="btn" onclick="edit(${index})">✏️</span>
        <span class="btn" onclick="del(${index})">🗑</span>
      </div>
    `;

    app.appendChild(card);
  });
}

/* ⏱ 每秒刷新 + 翻页效果 */
setInterval(()=>{
  data.forEach((item,index)=>{
    const el=document.getElementById("t"+index);
    if(!el) return;

    const now=new Date();
    const target=parseDate(item.date);
    const diff=target-now;

    let f = diff<=0 ? {d:0,h:0,m:0,s:0} : format(diff);

    const text = `${f.d}天 ${f.h}时 ${f.m}分 ${f.s}秒`;

    if(el.innerText !== text){
      animate(el);
      el.innerText = text;
    }
  });
},1000);

/* ➕新增 */
function addItem(){
  const title=prompt("名字？");
  const date=prompt("日期（2026-07-05 12:00）");
  const category=prompt("分类");

  if(title && date && category){
    data.push({title,date,category});
    save();
    render();
  }
}

/* ✏️编辑 */
function edit(i){
  const t = prompt("修改名称",data[i].title);
  const d = prompt("修改时间",data[i].date);
  const c = prompt("修改分类",data[i].category);

  if(t && d && c){
    data[i]={title:t,date:d,category:c};
    save();
    render();
  }
}

/* 🗑删除 */
function del(i){
  if(confirm("删除？")){
    data.splice(i,1);
    save();
    render();
  }
}

render();
</script>

</body>
</html>
