<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>倒计时</title>

<style>
body{
  margin:0;
  font-family:"Noto Sans SC",sans-serif;
  background: linear-gradient(180deg,#e8f5e9,#c8e6c9);
  color:#1b5e20;
}

/* 🟢 顶部主卡片（Widget风） */
.hero{
  margin:20px;
  padding:25px;
  border-radius:25px;
  background: rgba(255,255,255,0.75);
  backdrop-filter: blur(25px);
  box-shadow:0 10px 30px rgba(0,0,0,0.1);
  text-align:center;
}

.hero-title{
  font-size:22px;
  margin-bottom:10px;
}

.hero-time{
  font-size:42px;
  font-weight:bold;
}

/* 分类 */
.section{
  margin:10px 20px;
}

.section h2{
  font-size:18px;
  cursor:pointer;
}

/* 卡片 */
.card{
  background: rgba(255,255,255,0.6);
  backdrop-filter: blur(15px);
  border-radius:18px;
  padding:15px;
  margin:10px 0;
}

/* 小字 */
.small{
  font-size:20px;
  font-weight:bold;
}

/* ➕按钮 */
.add-btn{
  position:fixed;
  bottom:25px;
  right:25px;
  width:60px;
  height:60px;
  border-radius:50%;
  background: rgba(255,255,255,0.85);
  text-align:center;
  line-height:60px;
  font-size:30px;
}
</style>
</head>

<body>

<div class="hero" id="hero"></div>
<div id="app"></div>
<div class="add-btn" onclick="addItem()">＋</div>

<script>

let data = JSON.parse(localStorage.getItem("countdowns")) || [
  {title:"日语考试",date:"2026-07-05 12:00",category:"学习"}
];

function save(){
  localStorage.setItem("countdowns",JSON.stringify(data));
}

function parseDate(s){
  return new Date(s.replace(/-/g,"/"));
}

/* ⏱ 格式化 */
function format(diff){
  const d=Math.floor(diff/(1000*60*60*24));
  const h=Math.floor((diff/(1000*60*60))%24);
  const m=Math.floor((diff/(1000*60))%60);
  const s=Math.floor((diff/1000)%60);
  return {d,h,m,s};
}

/* 🎨 颜色等级 */
function getColor(diff){
  const days = diff/(1000*60*60*24);
  if(days < 1) return "#e53935";   // 红
  if(days < 7) return "#fb8c00";   // 橙
  return "#2e7d32";                // 绿
}

/* 🟢 主卡片 */
function renderHero(){
  let main = data[0];
  if(!main) return;

  const now=new Date();
  const target=parseDate(main.date);
  const diff=target-now;
  let f = format(diff);

  document.getElementById("hero").innerHTML=`
    <div class="hero-title">${main.title}</div>
    <div class="hero-time" style="color:${getColor(diff)}">
      ${f.d}天 ${f.h}:${f.m}:${f.s}
    </div>
  `;
}

/* 📂 列表 */
function renderList(){
  const app=document.getElementById("app");
  app.innerHTML="";

  data.forEach(item=>{
    const card=document.createElement("div");
    card.className="card";

    const now=new Date();
    const target=parseDate(item.date);
    const diff=target-now;

    let f = format(diff);

    card.innerHTML=`
      <div>${item.title}</div>
      <div class="small" style="color:${getColor(diff)}">
        ${f.d}天 ${f.h}时 ${f.m}分 ${f.s}秒
      </div>
    `;

    app.appendChild(card);
  });
}

/* ➕ */
function addItem(){
  const title=prompt("名字");
  const date=prompt("日期 (2026-07-05 12:00)");
  const category=prompt("分类");

  if(title && date && category){
    data.push({title,date,category});
    save();
    render();
  }
}

/* 🔁 主循环 */
function render(){
  renderHero();
  renderList();
}

setInterval(render,1000);
render();

</script>

</body>
</html>
